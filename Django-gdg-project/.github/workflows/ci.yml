name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        working-directory: my_first_project/lmsProject
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: my_first_project/lmsProject
        run: |
          python manage.py test lmsApp --keepdb

      - name: Check static collection
        working-directory: my_first_project/lmsProject
        run: |
          python manage.py collectstatic --noinput --dry-run

      - name: Run lightweight benchmark
        working-directory: my_first_project/lmsProject
        run: |
          python manage.py benchmark_lmsapp --iterations 3
