{% extends "lmsApp/base.html" %}
{% load static %}

{% block title %}Confirm Delete{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'Styles/confirm_delete.css' %}" />
{% endblock %}

{% block content %}
<h2>Confirm Delete Book</h2>

<p>Are you sure you want to delete this book?</p>

<p><strong>{{ book.title }}</strong> by {{ book.author }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="delete-btn">Yes, Delete</button>
    <button type="button" class="cancel-link" data-url="{% url 'book_list' %}" onclick="window.location.href = this.dataset.url">Cancel</button>
</form>
{% endblock %}
