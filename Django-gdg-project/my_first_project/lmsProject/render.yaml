services:
  - type: web
    name: lms-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic
    startCommand: gunicorn lmsProject.wsgi:application --workers ${WEB_CONCURRENCY:-1} --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: lmsProject.settings
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: lms-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://lms-web.onrender.com

databases:
  - name: lms-db
    plan: free
    databaseName: lms_db
    user: lms_user
